<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 个人作品集</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h2 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .auth-header p {
            color: #666;
            font-size: 14px;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #f5f7fa;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.3s ease;
        }
        .auth-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 14px;
            font-weight: 500;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }
        .form-input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #555555;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background-color: #333333;
            color: #ffffff;
        }
        .form-input::placeholder {
            color: #888888;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .message.error {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }
        .message.success {
            background: rgba(39, 174, 96, 0.1);
            color: #27ae60;
            border: 1px solid rgba(39, 174, 96, 0.3);
        }
        .message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #667eea;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .user-info {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(39, 174, 96, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .user-info.show {
            display: block;
        }
        .user-info h3 {
            color: #27ae60;
            margin-bottom: 10px;
        }
        .user-info p {
            color: #666;
            font-size: 14px;
        }
        .user-info .username {
            font-weight: 600;
            color: #2c3e50;
        }
        .logout-btn {
            background: #e74c3c;
            margin-top: 15px;
        }
        .logout-btn:hover {
            background: #c0392b;
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }
        .api-test {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e1e1e1;
        }
        .api-test h4 {
            font-size: 14px;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .api-result {
            background: #f5f7fa;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2><i class="fas fa-user-circle"></i> 个人作品集</h2>
                <p>欢迎回来，请登录您的账户</p>
            </div>

            <div id="message" class="message"></div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">登录</button>
                <button class="auth-tab" onclick="switchTab('register')">注册</button>
            </div>

            <div id="loginForm" class="form-section active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" class="form-input" id="loginUsername" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" id="loginBtn">
                        <span id="loginBtnText">登录</span>
                    </button>
                </form>
            </div>

            <div id="registerForm" class="form-section">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" class="form-input" id="regUsername" placeholder="请输入用户名（至少3个字符）" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" class="form-input" id="regEmail" placeholder="请输入邮箱" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" class="form-input" id="regPassword" placeholder="请输入密码（至少6个字符）" required>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" id="registerBtn">
                        <span id="registerBtnText">注册</span>
                    </button>
                </form>
            </div>

            <div id="userInfo" class="user-info">
                <h3><i class="fas fa-check-circle"></i> 已登录</h3>
                <p>欢迎回来，<span class="username" id="displayUsername"></span>！</p>
                <p style="font-size: 12px; color: #999;">Token 已保存在浏览器中</p>
                <button class="submit-btn logout-btn" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i> 退出登录
                </button>
            </div>

            <div class="api-test">
                <h4><i class="fas fa-database"></i> API 测试区域</h4>
                <button class="submit-btn" style="font-size: 13px; padding: 10px; margin-bottom: 10px;" onclick="testPublicAPI()">
                    测试公开接口（无需Token）
                </button>
                <button class="submit-btn" style="font-size: 13px; padding: 10px;" onclick="testProtectedAPI()">
                    测试受保护接口（需Token）
                </button>
                <div id="apiResult" class="api-result" style="margin-top: 10px; display: none;"></div>
            </div>

            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> 返回首页
            </a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';
        const TOKEN_KEY = 'auth_token';
        const USER_KEY = 'auth_user';

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            hideMessage();
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type} show`;
            setTimeout(() => msg.classList.remove('show'), 5000);
        }

        function hideMessage() {
            document.getElementById('message').classList.remove('show');
        }

        function setLoading(btn, text, loading) {
            const btnText = document.getElementById(btn + 'Text') || btn;
            if (loading) {
                btnText.innerHTML = '<span class="loading"></span>处理中...';
                document.getElementById(btn).disabled = true;
            } else {
                btnText.textContent = text;
                document.getElementById(btn).disabled = false;
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            setLoading('loginBtn', '登录', true);

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username.trim()) {
                showMessage('请输入用户名', 'error');
                setLoading('loginBtn', '登录', false);
                return;
            }

            if (!password.trim()) {
                showMessage('请输入密码', 'error');
                setLoading('loginBtn', '登录', false);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem(TOKEN_KEY, data.token);
                    localStorage.setItem(USER_KEY, JSON.stringify(data.user));
                    showMessage('登录成功！正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showMessage(data.error || '账号或密码错误', 'error');
                }
            } catch (err) {
                showMessage('网络错误，请检查服务器是否运行', 'error');
            }

            setLoading('loginBtn', '登录', false);
        }

        async function handleRegister(e) {
            e.preventDefault();
            setLoading('registerBtn', '注册', true);

            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const response = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem(TOKEN_KEY, data.token);
                    localStorage.setItem(USER_KEY, JSON.stringify(data.user));
                    showMessage('注册成功！', 'success');
                    updateUI(true, data.user);
                    setTimeout(() => switchTab('login'), 1500);
                } else {
                    showMessage(data.error || '注册失败', 'error');
                }
            } catch (err) {
                showMessage('网络错误，请检查服务器是否运行', 'error');
            }

            setLoading('registerBtn', '注册', false);
        }

        function handleLogout() {
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(USER_KEY);
            showMessage('已退出登录', 'success');
            updateUI(false);
        }

        function updateUI(isLoggedIn, user) {
            const userInfo = document.getElementById('userInfo');
            const displayUsername = document.getElementById('displayUsername');

            if (isLoggedIn && user) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'none';
                document.querySelector('.auth-tabs').style.display = 'none';
                userInfo.classList.add('show');
                displayUsername.textContent = user.username;
            } else {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
                document.querySelector('.auth-tabs').style.display = 'flex';
                userInfo.classList.remove('show');
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
            }
        }

        function checkLoginStatus() {
            const token = localStorage.getItem(TOKEN_KEY);
            const userStr = localStorage.getItem(USER_KEY);

            if (token && userStr) {
                try {
                    const user = JSON.parse(userStr);
                    updateUI(true, user);
                } catch (e) {
                    localStorage.removeItem(TOKEN_KEY);
                    localStorage.removeItem(USER_KEY);
                }
            }
        }

        async function testPublicAPI() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.style.display = 'block';
            resultDiv.textContent = '正在请求...';

            try {
                const response = await fetch(`${API_BASE}/api/articles`);
                const data = await response.json();
                resultDiv.textContent = `✅ 公开接口调用成功！\n\n返回数据：\n${JSON.stringify(data, null, 2)}`;
                resultDiv.style.color = '#27ae60';
            } catch (err) {
                resultDiv.textContent = `❌ 请求失败：\n${err.message}`;
                resultDiv.style.color = '#e74c3c';
            }
        }

        async function testProtectedAPI() {
            const resultDiv = document.getElementById('apiResult');
            const token = localStorage.getItem(TOKEN_KEY);

            if (!token) {
                resultDiv.style.display = 'block';
                resultDiv.textContent = '❌ 请先登录！\n\n点击"登录"标签登录后再试。';
                resultDiv.style.color = '#e74c3c';
                return;
            }

            resultDiv.style.display = 'block';
            resultDiv.textContent = '正在请求（带Token）...';

            try {
                const response = await fetch(`${API_BASE}/api/user/info`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (data.success) {
                    resultDiv.textContent = `✅ 受保护接口调用成功！\n\n返回数据：\n${JSON.stringify(data, null, 2)}`;
                    resultDiv.style.color = '#27ae60';
                } else {
                    resultDiv.textContent = `❌ Token验证失败：\n${data.error}`;
                    resultDiv.style.color = '#e74c3c';
                }
            } catch (err) {
                resultDiv.textContent = `❌ 请求失败：\n${err.message}`;
                resultDiv.style.color = '#e74c3c';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
        });
    </script>
</body>
</html>
