<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="avatar">
                <i class="fas fa-user"></i>
            </div>
            <h1>个人作品集</h1>
            <p class="title">前端开发工程师</p>
            
            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> 首页</a></li>
                    <li><a href="about.html"><i class="fas fa-user"></i> 关于我</a></li>
                    <li><a href="projects.html"><i class="fas fa-briefcase"></i> 项目展示</a></li>
                    <li><a href="contact.html"><i class="fas fa-envelope"></i> 联系我</a></li>
                    <li><a href="article.html"><i class="fas fa-file-alt"></i> 文章</a></li>
                    <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> 登录</a></li>
                </ul>
            </nav>

            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">项目数量</span>
                    <span class="stat-value">20+</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">文章数量</span>
                    <span class="stat-value">50+</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">技术栈</span>
                    <span class="stat-value">15</span>
                </div>
            </div>

            <div class="social-links">
                <a href="#" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" title="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="#" title="Email"><i class="fas fa-envelope"></i></a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 导航栏 -->
            <header class="navbar">
                <div class="logo">Portfolio</div>
                <div class="nav-links">
                    <a href="index.html">首页</a>
                    <a href="about.html">关于我</a>
                    <a href="projects.html">项目展示</a>
                    <a href="contact.html">联系我</a>
                    <a href="article.html">文章</a>
                    <a href="login.html">登录</a>
                </div>
                <div class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </div>
            </header>

            <!-- 页面标题 -->
            <section class="hero fade-in-up">
                <h2>联系我</h2>
                <p>如果您有任何问题或合作意向，欢迎随时联系我</p>
            </section>

            <div class="contact-container">
                <!-- 联系方式 -->
                <section class="contact-info">
                    <h3>联系方式</h3>
                    <div class="contact-item">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <span class="contact-label">邮箱</span>
                            <span class="contact-value">contact@example.com</span>
                        </div>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-phone"></i>
                        <div>
                            <span class="contact-label">电话</span>
                            <span class="contact-value">+86 138-0000-0000</span>
                        </div>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <span class="contact-label">地址</span>
                            <span class="contact-value">北京市朝阳区科技园区</span>
                        </div>
                    </div>
                    <div class="contact-item">
                        <i class="fab fa-weixin"></i>
                        <div>
                            <span class="contact-label">微信</span>
                            <span class="contact-value">developer_cn</span>
                        </div>
                    </div>
                </section>

                <!-- 联系表单 -->
                <section class="contact-form">
                    <h3>发送消息</h3>
                    <form>
                        <div class="form-group">
                            <label for="name">姓名</label>
                            <input type="text" id="name" name="name" placeholder="请输入您的姓名">
                        </div>
                        <div class="form-group">
                            <label for="email">邮箱</label>
                            <input type="email" id="email" name="email" placeholder="请输入您的邮箱">
                        </div>
                        <div class="form-group">
                            <label for="subject">主题</label>
                            <input type="text" id="subject" name="subject" placeholder="请输入消息主题">
                        </div>
                        <div class="form-group">
                            <label for="message">消息内容</label>
                            <textarea id="message" name="message" rows="5" placeholder="请输入您的消息内容"></textarea>
                        </div>
                        <button type="submit" class="btn">发送消息</button>
                    </form>
                </section>
            </div>

            <!-- 页脚 -->
            <footer>
                <p>&copy; 2026 个人作品集. All rights reserved.</p>
                <div class="social-links">
                    <a href="#"><i class="fab fa-github"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                </div>
            </footer>
        </main>
    </div>

    <!-- 回到顶部按钮 -->
    <a href="#" class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>
    </a>

    <script>
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });

        backToTop.addEventListener('click', (e) => {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
